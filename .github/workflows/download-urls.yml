name: Download URLs from list

on:
  # Run manually from GitHub UI
  workflow_dispatch:
  # Optional: Run on a schedule (e.g., daily at 2 AM)
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write  # Needed to push back to repo

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper commit
      
      - name: Create downloads directory
        run: mkdir -p downloads
      
      - name: Read URLs and download
        run: |
          # Read each line from list.txt and download
          while IFS= read -r url; do
            # Skip empty lines and comments
            if [[ -z "$url" || "$url" =~ ^[[:space:]]*# ]]; then
              continue
            fi
            
            # Create safe filename from URL
            filename=$(echo "$url" | sed 's|https\?://||' | sed 's|/|_|g' | sed 's/[^a-zA-Z0-9._-]/_/g')
            
            echo "Downloading: $url"
            
            # Download the URL (follow redirects, continue on errors)
            curl -L --fail -o "downloads/$filename" "$url" || echo "Failed to download: $url"
            
          done < list.txt
        shell: bash
      
      - name: Check for changes
        id: changes
        run: |
          # Check if there are any changes to commit
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push if changed
        if: steps.changes.outputs.changes == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add downloads/
          git commit -m "Downloaded URLs from list.txt - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
